name: AcreetionOS GNOME Build Pipeline

on:
  schedule:
    # Run once a week on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  ISO_LABEL: "AcreetionOS-GNOME"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Arch Build Environment
        run: |
          echo "==> Initialising pacman keyring..."
          pacman-key --init
          pacman-key --populate archlinux
          
          echo "==> Refreshing databases and upgrading keyring..."
          pacman -Sy --noconfirm archlinux-keyring
          
          echo "==> Installing build dependencies..."
          pacman -Su --noconfirm
          pacman -S --noconfirm --needed archiso squashfs-tools dosfstools erofs-utils mtools xorriso libarchive grub edk2-shell awk grep

      - name: Fix packages list to prevent build failures
        run: |
          echo "==> Removing missing or broken packages from packages.x86_64 to ensure build success"
          # Remove comments and empty lines
          sed -i '/^[[:space:]]*#/d' packages.x86_64
          sed -i '/^[[:space:]]*$/d' packages.x86_64
          
          # Use local pacman cache to check valid packages, create a new list
          # We update pacman db using the custom pacman.conf just in case
          pacman -Sy --config pacman.conf
          
          touch valid_packages.txt
          for pkg in $(cat packages.x86_64); do
            if pacman -Ss "^${pkg}$" --config pacman.conf >/dev/null 2>&1; then
              echo "$pkg" >> valid_packages.txt
            else
              echo "Warning: Package $pkg not found, removing from build list"
            fi
          done
          
          mv valid_packages.txt packages.x86_64
          echo "==> Final package list:"
          cat packages.x86_64

      - name: Fix configs to prevent build failures
        run: |
          # Create gnome-configs if it doesn't exist
          mkdir -p airootfs/gnome-configs
          touch airootfs/gnome-configs/.bashrc
          
          # Clean broken references in dd.sh
          if [ -f airootfs/usr/bin/dd.sh ]; then
            sed -i '/terminal-settings/d' airootfs/usr/bin/dd.sh
          fi
          
          # Fix any missing permissions
          chmod +x airootfs/usr/local/bin/postinstall.sh 2>/dev/null || true
          chmod +x airootfs/usr/bin/dd.sh 2>/dev/null || true

      - name: Build ISO
        run: |
          echo "==> Starting AcreetionOS GNOME ISO build..."
          mkdir -p work out
          
          # Build the ISO using archiso
          mkarchiso -L "${ISO_LABEL}" -v -w work -o out -C pacman.conf .
          
          echo "==> Build complete."
          ls -lh out/*.iso
          
          cd out
          sha256sum *.iso > SHA256SUMS
          md5sum *.iso > MD5SUMS

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: acreetionos-gnome-${{ github.sha }}
          path: |
            out/*.iso
            out/SHA256SUMS
            out/MD5SUMS
          retention-days: 14
      - name: Upload to R2
        env:
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          BUCKET: acreetionos-gnome
        run: |
          I=$(ls out/*.iso 2>/dev/null | head -1); [ -z "$I" ] && exit 0; N=$(basename "$I")
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/r2/buckets" -H "Authorization: Bearer $CF_TOKEN" -d '{"name":"'$BUCKET'"}' || true
          U=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/r2/buckets/$BUCKET/objects/${N}/upload" -H "Authorization: Bearer $CF_TOKEN" -d '{}' | python3 -c "import sys,json;print(json.load(sys.stdin).get('result',{}).get('uploadURL',''))")
          [ -n "$U" ] && curl -s -X PUT "$U" --data-binary @"$I" && echo "Uploaded $N" || echo "Upload failed"
